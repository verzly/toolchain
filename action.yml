name: Verzly Toolchain
description: Install and optionally run the unified Verzly toolchain executable from verzly/toolchain releases.
author: Verzly

inputs:
  version:
    description: Verzly release version to install. Use latest, v1.2.3, or 1.2.3.
    required: false
    default: latest
  repository:
    description: Repository that publishes Verzly release assets.
    required: false
    default: verzly/toolchain
  github-token:
    description: Token used by the GitHub CLI to download release assets.
    required: false
    default: ""
  command:
    description: Optional command to run after installing Verzly, for example `verzly repository check`.
    required: false
    default: ""
  working-directory:
    description: Directory used when running the optional command.
    required: false
    default: .
  install-dir:
    description: Directory where the executable and compatibility shims are installed.
    required: false
    default: ""
  create-shims:
    description: Create compatibility commands such as github-release, tauri-release, and ios-signing.
    required: false
    default: "true"

outputs:
  path:
    description: Absolute path to the installed verzly executable.
    value: ${{ steps.install.outputs.path }}
  install-dir:
    description: Directory added to PATH.
    value: ${{ steps.install.outputs.install-dir }}
  version:
    description: Installed Verzly version.
    value: ${{ steps.install.outputs.version }}
  target:
    description: Resolved release asset target for the current runner.
    value: ${{ steps.install.outputs.target }}

runs:
  using: composite
  steps:
    - name: Install Verzly
      id: install
      shell: bash
      env:
        GH_TOKEN: ${{ inputs['github-token'] != '' && inputs['github-token'] || github.token }}
        VERZLY_VERSION: ${{ inputs.version }}
        VERZLY_REPOSITORY: ${{ inputs.repository }}
        VERZLY_INSTALL_DIR: ${{ inputs['install-dir'] }}
        VERZLY_CREATE_SHIMS: ${{ inputs['create-shims'] }}
      run: ${{ github.action_path }}/actions/_shared/install-verzly.sh

    - name: Run Verzly command
      if: ${{ inputs.command != '' }}
      shell: bash
      working-directory: ${{ inputs['working-directory'] }}
      run: ${{ inputs.command }}
