name: Verzly rust-cache
description: Install and optionally run the rust-cache standalone executable published by this repository.
author: Verzly

inputs:
  github-token:
    description: Token used to read release assets. The default GitHub token is enough for public releases.
    required: false
    default: ""
  version:
    description: GitHub Release tag to download. Use 1.2.3 or v1.2.3. Leave empty to use the latest release.
    required: false
    default: ""
  install-only:
    description: Install the executable and add it to PATH without running it.
    required: false
    default: "false"
  args:
    description: Arguments passed to rust-cache when install-only is false.
    required: false
    default: "--help"
  working-directory:
    description: Directory where rust-cache should run.
    required: false
    default: "."

outputs:
  bin-path:
    description: Absolute path to the installed executable.
    value: ${{ steps.install.outputs.bin-path }}
  host-target:
    description: Release target used to select the executable asset.
    value: ${{ steps.host.outputs.host-target }}

runs:
  using: composite
  steps:
    - name: Resolve host target
      id: host
      shell: bash
      run: |
        set -euo pipefail

        EXT=""
        case "${{ runner.os }}" in
          Linux)
            ARCH="$(uname -m)"
            case "${ARCH}" in
              x86_64|amd64) HOST="linux-x64" ;;
              aarch64|arm64) echo "::error::Linux ARM64 assets are not published yet."; exit 1 ;;
              *) echo "::error::Unsupported Linux architecture: ${ARCH}"; exit 1 ;;
            esac
            ;;
          macOS)
            ARCH="$(uname -m)"
            case "${ARCH}" in
              x86_64|amd64) HOST="macos-x64" ;;
              aarch64|arm64) HOST="macos-arm64" ;;
              *) echo "::error::Unsupported macOS architecture: ${ARCH}"; exit 1 ;;
            esac
            ;;
          Windows)
            EXT=".exe"
            ARCH="${PROCESSOR_ARCHITECTURE:-AMD64}"
            case "${ARCH}" in
              AMD64|amd64|x86_64) HOST="windows-x64" ;;
              ARM64|arm64|aarch64) echo "::error::Windows ARM64 assets are not published yet."; exit 1 ;;
              *) echo "::error::Unsupported Windows architecture: ${ARCH}"; exit 1 ;;
            esac
            ;;
          *)
            echo "::error::Unsupported runner OS: ${{ runner.os }}"
            exit 1
            ;;
        esac

        echo "host-target=${HOST}" >> "${GITHUB_OUTPUT}"
        echo "extension=${EXT}" >> "${GITHUB_OUTPUT}"

    - name: Install rust-cache
      id: install
      shell: bash
      env:
        INPUT_TOKEN: ${{ inputs.github-token }}
        DEFAULT_TOKEN: ${{ github.token }}
        ACTION_REPOSITORY: ${{ github.action_repository }}
        VERSION: ${{ inputs.version }}
        HOST: ${{ steps.host.outputs.host-target }}
        EXT: ${{ steps.host.outputs.extension }}
      run: |
        set -euo pipefail

        if ! command -v gh >/dev/null 2>&1; then
          echo "::error::The GitHub CLI is required to download release assets. GitHub-hosted runners include it by default."
          exit 1
        fi

        TOKEN="${INPUT_TOKEN:-}"
        if [ -z "${TOKEN}" ]; then
          TOKEN="${DEFAULT_TOKEN:-}"
        fi
        if [ -z "${TOKEN}" ]; then
          echo "::error::No GitHub token is available. Pass github-token explicitly."
          exit 1
        fi
        export GH_TOKEN="${TOKEN}"

        REPOSITORY="${ACTION_REPOSITORY:-}"
        if [ -z "${REPOSITORY}" ]; then
          REPOSITORY="${GITHUB_ACTION_REPOSITORY:-}"
        fi
        if [ -z "${REPOSITORY}" ]; then
          REPOSITORY="verzly/rust-cache"
        fi

        TAG="${VERSION}"
        if [ -n "${TAG}" ] && [[ "${TAG}" != v* ]]; then
          TAG="v${TAG}"
        fi

        TOOL_DIR="${RUNNER_TEMP}/rust-cache-action"
        BIN_DIR="${RUNNER_TEMP}/rust-cache-bin"
        PATTERN="rust-cache-v*-${HOST}${EXT}"

        rm -rf "${TOOL_DIR}" "${BIN_DIR}"
        mkdir -p "${TOOL_DIR}" "${BIN_DIR}"

        echo "Downloading ${PATTERN} from ${REPOSITORY}"
        if [ -n "${TAG}" ]; then
          gh release download "${TAG}" --repo "${REPOSITORY}" --pattern "${PATTERN}" --dir "${TOOL_DIR}"
          gh release download "${TAG}" --repo "${REPOSITORY}" --pattern "${PATTERN}.sha256" --dir "${TOOL_DIR}" || true
        else
          gh release download --repo "${REPOSITORY}" --pattern "${PATTERN}" --dir "${TOOL_DIR}"
          gh release download --repo "${REPOSITORY}" --pattern "${PATTERN}.sha256" --dir "${TOOL_DIR}" || true
        fi

        TOOL="$(find "${TOOL_DIR}" -maxdepth 1 -type f -name "${PATTERN}" | sort | tail -n 1)"
        if [ -z "${TOOL}" ]; then
          echo "::error::No rust-cache executable matched ${PATTERN} in ${REPOSITORY}."
          find "${TOOL_DIR}" -maxdepth 1 -type f -print || true
          exit 1
        fi

        CHECKSUM="${TOOL}.sha256"
        if [ -f "${CHECKSUM}" ]; then
          if command -v sha256sum >/dev/null 2>&1; then
            (cd "$(dirname "${TOOL}")" && sha256sum -c "$(basename "${CHECKSUM}")")
          elif command -v shasum >/dev/null 2>&1; then
            (cd "$(dirname "${TOOL}")" && shasum -a 256 -c "$(basename "${CHECKSUM}")")
          fi
        fi

        cp "${TOOL}" "${BIN_DIR}/rust-cache${EXT}"
        if [ "${{ runner.os }}" != "Windows" ]; then
          chmod 755 "${BIN_DIR}/rust-cache${EXT}"
        fi

        echo "${BIN_DIR}" >> "${GITHUB_PATH}"
        echo "bin-path=${BIN_DIR}/rust-cache${EXT}" >> "${GITHUB_OUTPUT}"
        "${BIN_DIR}/rust-cache${EXT}" --version || true

    - name: Run rust-cache
      if: inputs.install-only != 'true'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        BIN_PATH: ${{ steps.install.outputs.bin-path }}
        ARGS: ${{ inputs.args }}
      run: |
        set -euo pipefail
        # The arguments are intentionally passed through the shell so workflow authors can provide normal CLI strings.
        # shellcheck disable=SC2086
        "${BIN_PATH}" ${ARGS}
