files = []
# The toolchain release does not upload executable assets and does not update version files.

[release]
target_branch = "master"
branch_prefix = "release/"
tag_prefix = "v"
tag_suffix = ""
name_prefix = "toolchain v"
name_suffix = ""
commit_message = "chore(release): prepare {tag}"
merge_message = "chore(release): merge {tag}"
cleanup = true
latest = true

[github]
target_repository = "verzly/toolchain"
source_repository = ""
source_tag_prefix = ""
source_tag_suffix = ""
generate_notes = true
