[project]
root = "."
binary = "repo-quality"

[build]
out_dir = "dist/repo-quality"
default_strategy = "host"
container_engine = "podman"

[artifacts]
checksum = true
manifest = true
name_template = "{binary}-v{version}-{target}{ext}"

[targets.linux-x64]
enabled = true
triple = "x86_64-unknown-linux-gnu"
strategy = "host"
command = "cargo build --release -p repo-quality"
artifacts = [".cache/rust/packages/toolchain/target/release/repo-quality"]

[targets.macos-x64]
enabled = true
triple = "x86_64-apple-darwin"
strategy = "host"
command = "cargo build --release -p repo-quality"
artifacts = [".cache/rust/packages/toolchain/target/release/repo-quality"]

[targets.macos-arm64]
enabled = true
triple = "aarch64-apple-darwin"
strategy = "host"
command = "cargo build --release -p repo-quality"
artifacts = [".cache/rust/packages/toolchain/target/release/repo-quality"]

[targets.windows-x64]
enabled = true
triple = "x86_64-pc-windows-msvc"
strategy = "host"
command = "cargo build --release -p repo-quality"
artifacts = [".cache/rust/packages/toolchain/target/release/repo-quality.exe"]
