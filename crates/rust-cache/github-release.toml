# Release config for `rust-cache`.
# The same file is used for both phases:
# - prepare/finalize read `[source_release]` and update `[[files]]` in verzly/toolchain.
# - publish reads `[release]` and creates the public release in verzly/rust-cache.

prepare_commands = ["cargo generate-lockfile"]

[release]
target_branch = "master"
branch_prefix = "release/"
tag_prefix = "v"
tag_suffix = ""
name_prefix = ""
name_suffix = ""
commit_message = "chore(release): prepare {tag}"
merge_message = "chore(release): merge {tag}"
cleanup = true
latest = true
floating_tags = true
latest_tag = true
next_tag = true

[source_release]
target_branch = "master"
branch_prefix = "release/"
tag_prefix = "rust-cache-v"
tag_suffix = ""
name_prefix = "rust-cache v"
name_suffix = ""
commit_message = "chore(release): prepare {tag}"
merge_message = "chore(release): merge {tag}"
cleanup = true
latest = false

[github]
target_repository = "verzly/rust-cache"
source_repository = "verzly/toolchain"
source_tag_prefix = "rust-cache-v"
source_tag_suffix = ""
generate_notes = false
notes_body = """
This version was developed in `verzly/toolchain`.

Source changes for this package can be reviewed from `{previous_source_tag}` to `{source_tag}`:
{source_compare_url}

The distribution repository contains the public GitHub Action surface and release assets. Source changes and pull requests live in `verzly/toolchain`.
"""

[github.notes]
mode = "scoped"
include_scopes = ["rust-cache", "all"]
include_paths = ["crates/rust-cache/"]

[[files]]
path = "crates/rust-cache/Cargo.toml"
kind = "toml"
key = "package.version"
value = "{version}"
optional = false
