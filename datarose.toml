distribution_path = ".codex/distributions/rust-cache"
cargo_binary = "rust-cache"
cargo_package = "rust-cache"
cargo_out_dir = "dist/rust-cache"
cargo_targets = ["linux-x64", "macos-x64", "macos-arm64", "windows-x64"]
prepare_commands = ["cargo generate-lockfile"]
version_file = "crates/rust-cache/Cargo.toml"
