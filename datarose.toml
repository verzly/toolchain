# Managed by repo-quality. Project-specific overrides are allowed.
version = 1

[quality]
workspace = "."
languages = ["rust"]

[release]
enabled = true
target_branch = "master"
source_repository = "verzly/toolchain"
secret_name = "DISTRIBUTION_REPO_TOKEN"
release_all = true

[[release.targets]]
name = "github-release"
repository = "verzly/github-release"
cargo_release_config = "crates/github-release/cargo-release.toml"
distribution_path = ".codex/distributions/github-release"
prepare_commands = ["cargo generate-lockfile"]
version_file = "crates/github-release/Cargo.toml"
version_key = "package.version"
version_value = "{version}"
source_tag_prefix = "github-release-v"
generate_notes = false
include_scopes = ["github-release", "all"]
include_paths = ["crates/github-release/"]

