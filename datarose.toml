[[release.targets]]
name = "toolchain"
path = "."
strategy = "same-repo"
workflow = "custom"
source_kind = "custom"
repository = "verzly/toolchain"
source_repository = ""
distribution_path = ""
cargo_binary = ""
cargo_package = ""
cargo_out_dir = ""
cargo_targets = []
prepare_commands = []
version_files = false
source_tag_prefix = "v"
release_name_prefix = "toolchain v"
source_release = false
generate_notes = true
floating_tags = false
latest_tag = false
next_tag = false
include_scopes = ["all"]
include_paths = ["."]

[rust_cache.cache]
dir = ".cache"
package = "toolchain"
redirect_cargo_home = false
redirect_gradle = true

[rust_cache.cargo]
target_dir = "rust/packages/{package}/target"

[rust_cache.env]
GRADLE_USER_HOME = "android/gradle"
NPM_CONFIG_CACHE = "js/npm"
PNPM_STORE_PATH = "js/pnpm-store"
YARN_CACHE_FOLDER = "js/yarn"

[tauri_release.project]
root = "."
frontend_install = "aube install"

[tauri_release.build]
out_dir = "dist"
cache_dir = ".cache/tauri-release"
