source_tag_prefix = "rust-cache-v"
generate_notes = false
include_scopes = ["rust-cache", "all"]
include_paths = ["crates/rust-cache/"]

[[release.targets]]
name = "android-signing"
repository = "verzly/android-signing"
distribution_path = ".codex/distributions/android-signing"
cargo_binary = "android-signing"
cargo_package = "android-signing"
cargo_out_dir = "dist/android-signing"
cargo_targets = ["linux-x64", "macos-x64", "macos-arm64", "windows-x64"]
prepare_commands = ["cargo generate-lockfile"]
version_file = "crates/android-signing/Cargo.toml"
