name = "tauri-release"
repository = "verzly/tauri-release"
distribution_path = ".codex/distributions/tauri-release"
cargo_binary = "tauri-release"
cargo_package = "tauri-release"
cargo_out_dir = "dist/tauri-release"
cargo_targets = ["linux-x64", "macos-x64", "macos-arm64", "windows-x64"]
prepare_commands = ["cargo generate-lockfile"]
version_file = "crates/tauri-release/Cargo.toml"
version_key = "package.version"
version_value = "{version}"
