# Managed by repo-quality. Project-specific overrides are allowed.
version = 1

[quality]
workspace = "."
languages = ["rust"]

[release]
enabled = true
target_branch = "master"
source_repository = "verzly/toolchain"
secret_name = "DISTRIBUTION_REPO_TOKEN"
release_all = true
manage_cargo_packages = true

[[release.targets]]
name = "github-release"
repository = "verzly/github-release"
distribution_path = ".codex/distributions/github-release"
cargo_binary = "github-release"
cargo_package = "github-release"
cargo_out_dir = "dist/github-release"
cargo_targets = ["linux-x64", "macos-x64", "macos-arm64", "windows-x64"]
prepare_commands = ["cargo generate-lockfile"]
version_file = "crates/github-release/Cargo.toml"
version_key = "package.version"
version_value = "{version}"
source_tag_prefix = "github-release-v"
generate_notes = false
include_scopes = ["github-release", "all"]
include_paths = ["crates/github-release/"]

[[release.targets]]
name = "cargo-release"
repository = "verzly/cargo-release"
distribution_path = ".codex/distributions/cargo-release"
cargo_binary = "cargo-release"
cargo_package = "cargo-release"
cargo_out_dir = "dist/cargo-release"
cargo_targets = ["linux-x64", "macos-x64", "macos-arm64", "windows-x64"]
prepare_commands = ["cargo generate-lockfile"]
version_file = "crates/cargo-release/Cargo.toml"
version_key = "package.version"
version_value = "{version}"
source_tag_prefix = "cargo-release-v"
generate_notes = false
include_scopes = ["cargo-release", "all"]
include_paths = ["crates/cargo-release/"]

