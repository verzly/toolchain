#:schema ./schemas/datarose.toml.schema.json
# Managed by repository. Project-specific overrides are allowed.
version = 1

[quality]
workspace = "."
languages = ["rust"]

[quality.rust]
manage_cargo_lints = true
manage_clippy_config = true
lint_profile = "strict"

[quality.rust.lints.rust]
unsafe_code = "forbid"
unused_must_use = "deny"

[quality.rust.lints.clippy]
all = "deny"
dbg_macro = "deny"
todo = "deny"
unimplemented = "deny"

[release]
enabled = true
target_branch = "master"
source_repository = "verzly/toolchain"
release_all = false
manage_cargo_packages = false
manage_workflows = false

[[release.targets]]
name = "verzly"
path = "."
strategy = "same-repo"
workflow = "custom"
source_kind = "cargo-package"
repository = "verzly/toolchain"
cargo_binary = "verzly"
cargo_package = "verzly"
cargo_out_dir = "dist/verzly"
cargo_targets = ["linux-x64", "macos-x64", "macos-arm64", "windows-x64"]
prepare_commands = ["cargo generate-lockfile"]
source_tag_prefix = "v"
release_name_prefix = "Verzly v"
source_release = false
generate_notes = true
floating_tags = true
latest_tag = true
next_tag = true
include_scopes = ["verzly", "toolchain", "all"]
include_paths = ["."]
files = [
  { path = "crates/verzly/Cargo.toml", kind = "toml", key = "package.version", value = "{version}" },
  { path = "crates/github-release/Cargo.toml", kind = "toml", key = "package.version", value = "{version}" },
  { path = "crates/cargo-release/Cargo.toml", kind = "toml", key = "package.version", value = "{version}" },
  { path = "crates/tauri-release/Cargo.toml", kind = "toml", key = "package.version", value = "{version}" },
  { path = "crates/rust-cache/Cargo.toml", kind = "toml", key = "package.version", value = "{version}" },
  { path = "crates/android-signing/Cargo.toml", kind = "toml", key = "package.version", value = "{version}" },
  { path = "crates/ios-signing/Cargo.toml", kind = "toml", key = "package.version", value = "{version}" },
  { path = "crates/repository/Cargo.toml", kind = "toml", key = "package.version", value = "{version}" },
  { path = "Cargo.lock", kind = "cargo-lock-package", package = "verzly", value = "{version}" },
  { path = "Cargo.lock", kind = "cargo-lock-package", package = "github-release", value = "{version}" },
  { path = "Cargo.lock", kind = "cargo-lock-package", package = "cargo-release", value = "{version}" },
  { path = "Cargo.lock", kind = "cargo-lock-package", package = "tauri-release", value = "{version}" },
  { path = "Cargo.lock", kind = "cargo-lock-package", package = "rust-cache", value = "{version}" },
  { path = "Cargo.lock", kind = "cargo-lock-package", package = "android-signing", value = "{version}" },
  { path = "Cargo.lock", kind = "cargo-lock-package", package = "ios-signing", value = "{version}" },
  { path = "Cargo.lock", kind = "cargo-lock-package", package = "repository", value = "{version}" },
]

[rust_cache.cache]
dir = ".cache"
package = "toolchain"
redirect_cargo_home = false
redirect_gradle = true

[rust_cache.cargo]
target_dir = "rust/packages/{package}/target"

[rust_cache.generated]
paths = []

[rust_cache.env]
GRADLE_USER_HOME = "android/gradle"
NPM_CONFIG_CACHE = "js/npm"
PNPM_STORE_PATH = "js/pnpm-store"
YARN_CACHE_FOLDER = "js/yarn"

[tauri_release.project]
root = "."
frontend_install = "aube install"

[tauri_release.build]
out_dir = "dist"
cache_dir = ".cache/tauri-release"
