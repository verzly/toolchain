# Managed by repo-quality. Project-specific overrides are allowed.
version = 1

[quality]
workspace = "."
languages = ["rust"]

[release]
enabled = true
target_branch = "master"
source_repository = "verzly/toolchain"
secret_name = "DISTRIBUTION_REPO_TOKEN"
release_all = true

[[release.targets]]
name = "github-release"
repository = "verzly/github-release"
github_release_config = "crates/github-release/github-release.toml"
cargo_release_config = "crates/github-release/cargo-release.toml"
distribution_path = ".codex/distributions/github-release"

[[release.targets]]
name = "cargo-release"
repository = "verzly/cargo-release"
github_release_config = "crates/cargo-release/github-release.toml"
cargo_release_config = "crates/cargo-release/cargo-release.toml"
distribution_path = ".codex/distributions/cargo-release"

[[release.targets]]
name = "tauri-release"
repository = "verzly/tauri-release"
github_release_config = "crates/tauri-release/github-release.toml"
cargo_release_config = "crates/tauri-release/cargo-release.toml"
distribution_path = ".codex/distributions/tauri-release"

[[release.targets]]
name = "rust-cache"
repository = "verzly/rust-cache"
github_release_config = "crates/rust-cache/github-release.toml"
cargo_release_config = "crates/rust-cache/cargo-release.toml"
distribution_path = ".codex/distributions/rust-cache"

[[release.targets]]
name = "android-signing"
repository = "verzly/android-signing"
github_release_config = "crates/android-signing/github-release.toml"
cargo_release_config = "crates/android-signing/cargo-release.toml"
distribution_path = ".codex/distributions/android-signing"

[[release.targets]]
name = "repo-quality"
repository = "verzly/repo-quality"
github_release_config = "crates/repo-quality/github-release.toml"
cargo_release_config = "crates/repo-quality/cargo-release.toml"
distribution_path = ".codex/distributions/repo-quality"
