name: Release
run-name: Release Verzly v${{ inputs.version }}

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release, without the leading v. Examples: 1.2.3, 1.2.3-rc.1"
        required: true
      prerelease:
        description: "Publish as a prerelease. Leave auto to infer from SemVer prerelease labels."
        required: false
        type: choice
        default: auto
        options:
          - auto
          - "true"
          - "false"

permissions:
  contents: write

concurrency:
  group: release-verzly-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  preflight:
    name: Preflight
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Validate release inputs
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: v${{ inputs.version }}
          SOURCE_REF_NAME: ${{ github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail
          if [ "${SOURCE_REF_NAME}" != "master" ]; then
            echo "::error::Release workflows must be run from master. Current ref: ${SOURCE_REF_NAME}"
            exit 1
          fi
          if gh release view "${RELEASE_TAG}" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "::error::Release ${RELEASE_TAG} already exists in ${{ github.repository }}."
            exit 1
          fi
          if git ls-remote --exit-code --tags "https://github.com/${{ github.repository }}.git" "refs/tags/${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "::error::Tag ${RELEASE_TAG} already exists in ${{ github.repository }}."
            exit 1
          fi

  prepare:
    name: Prepare source
    needs: preflight
    runs-on: ubuntu-latest
    outputs:
      release-branch: ${{ steps.prepare.outputs.release_branch }}

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ github.token }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Configure Git
        run: |
          git config user.name "verzly-release-bot"
          git config user.email "release-bot@verzly.dev"

      - name: Bootstrap Verzly from source
        run: |
          cargo build --release -p verzly
          echo "${{ github.workspace }}/.cache/rust/packages/toolchain/target/release" >> "${GITHUB_PATH}"

      - name: Prepare release branch
        id: prepare
        run: >-
          verzly github-release prepare
          --config datarose.toml
          --release-target verzly
          --version "${{ inputs.version }}"

  test:
    name: Test prepared source
    needs: prepare
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare.outputs.release-branch }}
          fetch-depth: 0
          token: ${{ github.token }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest@0.9.137

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run tests
        run: cargo nextest run --workspace

      - name: Run doctests
        run: cargo test --workspace --doc

  build:
    name: Build Verzly for ${{ matrix.target }}
    needs:
      - prepare
      - test
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        target:
          - linux-x64
          - macos-x64
          - macos-arm64
          - windows-x64
        include:
          - os: ubuntu-latest
            target: linux-x64
          - os: macos-15-intel
            target: macos-x64
          - os: macos-14
            target: macos-arm64
          - os: windows-latest
            target: windows-x64

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare.outputs.release-branch }}
          fetch-depth: 0
          token: ${{ github.token }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Bootstrap Verzly from source
        shell: bash
        run: |
          cargo build --release -p verzly
          echo "${{ github.workspace }}/.cache/rust/packages/toolchain/target/release" >> "${GITHUB_PATH}"

      - name: Build executable asset
        shell: bash
        env:
          VERZLY_SCHEMA_REF: v${{ inputs.version }}
        run: >-
          verzly cargo-release build
          --config datarose.toml
          --release-target verzly
          --version "${{ inputs.version }}"
          --target "${{ matrix.target }}"

      - uses: actions/upload-artifact@v7
        with:
          name: verzly-${{ matrix.target }}
          path: dist/verzly/**/*
          if-no-files-found: error

  abort:
    name: Abort release branch
    needs:
      - prepare
      - test
      - build
    if: ${{ always() && needs.prepare.result == 'success' && (needs.test.result == 'failure' || needs.test.result == 'cancelled' || needs.build.result == 'failure' || needs.build.result == 'cancelled') }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ github.token }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Bootstrap Verzly from source
        run: |
          cargo build --release -p verzly
          echo "${{ github.workspace }}/.cache/rust/packages/toolchain/target/release" >> "${GITHUB_PATH}"

      - name: Delete prepared release branch
        run: >-
          verzly github-release abort
          --config datarose.toml
          --release-target verzly
          --version "${{ inputs.version }}"

  finalize:
    name: Finalize and publish release
    needs:
      - prepare
      - build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare.outputs.release-branch }}
          fetch-depth: 0
          token: ${{ github.token }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Configure Git
        run: |
          git config user.name "verzly-release-bot"
          git config user.email "release-bot@verzly.dev"

      - name: Bootstrap Verzly from source
        run: |
          cargo build --release -p verzly
          echo "${{ github.workspace }}/.cache/rust/packages/toolchain/target/release" >> "${GITHUB_PATH}"

      - uses: actions/download-artifact@v8
        with:
          pattern: verzly-*
          path: dist/verzly
          merge-multiple: true

      - name: Finalize release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          verzly github-release finalize
          --config datarose.toml
          --release-target verzly
          --version "${{ inputs.version }}"
          --prerelease "${{ inputs.prerelease }}"
          --assets dist/verzly
          --merge-strategy squash
