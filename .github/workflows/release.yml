name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version to release, without the leading v.
        required: true
      tools:
        description: Comma-separated tools to release, or all.
        required: false
        default: all

permissions:
  contents: write

jobs:
  test:
    name: Test workspace
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Test
        run: cargo test --workspace --all-targets

  build:
    name: Build ${{ matrix.tool }} on ${{ matrix.os }}
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        tool:
          - github-release
          - cargo-release
          - tauri-release
          - rust-cache
          - android-signing
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Decide whether this matrix entry is selected
        id: selected
        shell: bash
        env:
          TOOLS: ${{ inputs.tools }}
          TOOL: ${{ matrix.tool }}
        run: |
          set -euo pipefail
          normalized=",${TOOLS// /},"
          if [ "${TOOLS}" = "all" ] || [[ "${normalized}" == *",${TOOL},"* ]]; then
            echo "enabled=true" >> "${GITHUB_OUTPUT}"
          else
            echo "enabled=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Checkout
        if: steps.selected.outputs.enabled == 'true'
        uses: actions/checkout@v4

      - name: Install Rust
        if: steps.selected.outputs.enabled == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Build release asset
        if: steps.selected.outputs.enabled == 'true'
        shell: bash
        run: scripts/build-release-asset.sh "${{ matrix.tool }}" "${{ inputs.version }}"

      - name: Upload release asset
        if: steps.selected.outputs.enabled == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.tool }}-${{ matrix.os }}
          path: release-assets/${{ matrix.tool }}/*
          if-no-files-found: error

  publish:
    name: Publish distribution releases
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout toolchain
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.DISTRIBUTION_REPO_TOKEN }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release tools
        run: cargo build --release -p github-release -p cargo-release

      - name: Add release tools to PATH
        run: echo "${PWD}/target/release" >> "${GITHUB_PATH}"

      - name: Download executable assets
        uses: actions/download-artifact@v4
        with:
          path: downloaded-assets

      - name: Normalize downloaded assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          for tool in github-release cargo-release tauri-release rust-cache android-signing; do
            mkdir -p "release-assets/${tool}"
            find downloaded-assets -type f -name "${tool}-v${{ inputs.version }}-*" -exec cp {} "release-assets/${tool}/" \;
          done

      - name: Configure Git identity
        run: |
          git config user.name "verzly-release-bot"
          git config user.email "release-bot@verzly.dev"

      - name: Create source tags used for release notes
        shell: bash
        env:
          TOOLS: ${{ inputs.tools }}
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          for tool in github-release cargo-release tauri-release rust-cache android-signing; do
            normalized=",${TOOLS// /},"
            if [ "${TOOLS}" != "all" ] && [[ "${normalized}" != *",${tool},"* ]]; then
              continue
            fi
            tag="${tool}-v${VERSION}"
            git tag -a "${tag}" -m "${tool} v${VERSION}"
            git push origin "${tag}"
          done

      - name: Publish each selected distribution repository
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.DISTRIBUTION_REPO_TOKEN }}
          TOOLS: ${{ inputs.tools }}
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          mkdir -p distribution-repos
          for tool in github-release cargo-release tauri-release rust-cache android-signing; do
            normalized=",${TOOLS// /},"
            if [ "${TOOLS}" != "all" ] && [[ "${normalized}" != *",${tool},"* ]]; then
              continue
            fi

            repo="verzly/${tool}"
            checkout="distribution-repos/${tool}"
            gh repo clone "${repo}" "${checkout}"
            scripts/publish-distribution-repo.sh "${tool}" "${VERSION}" "release-assets" "${checkout}"
          done
