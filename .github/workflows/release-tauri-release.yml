name: Release Tauri Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release, without the leading v. Examples: 1.2.3, 1.2.3-rc.1"
        required: true
      prerelease:
        description: "Publish as a prerelease. Leave auto to infer from SemVer prerelease labels."
        required: false
        type: choice
        default: auto
        options:
          - auto
          - true
          - false

permissions:
  contents: write

env:
  TOOL: tauri-release

jobs:
  prepare_source:
    name: Prepare source release branch
    runs-on: ubuntu-latest

    outputs:
      release_branch: ${{ steps.prepare.outputs.release_branch }}
      source_tag: ${{ steps.prepare.outputs.tag }}

    steps:
      - name: Checkout toolchain
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.DISTRIBUTION_REPO_TOKEN }}

      - name: Configure Git identity
        run: |
          git config user.name "verzly-release-bot"
          git config user.email "release-bot@verzly.dev"

      - name: Prepare source release branch
        id: prepare
        shell: bash
        run: scripts/prepare-source-release.sh "${{ env.TOOL }}" "${{ inputs.version }}"

  test:
    name: Test workspace
    needs: prepare_source
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source release branch
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare_source.outputs.release_branch }}
          fetch-depth: 0
          token: ${{ secrets.DISTRIBUTION_REPO_TOKEN }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --workspace --all-targets

  build:
    name: Build ${{ env.TOOL }} on ${{ matrix.os }}
    needs:
      - prepare_source
      - test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout source release branch
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare_source.outputs.release_branch }}
          fetch-depth: 0
          token: ${{ secrets.DISTRIBUTION_REPO_TOKEN }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release asset
        shell: bash
        run: scripts/build-release-asset.sh "${{ env.TOOL }}" "${{ inputs.version }}"

      - name: Upload release asset
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.TOOL }}-${{ matrix.os }}
          path: release-assets/${{ env.TOOL }}/*
          if-no-files-found: error

  abort_source:
    name: Abort source release after failed build
    needs:
      - prepare_source
      - test
      - build
    if: ${{ always() && needs.prepare_source.result == 'success' && (needs.test.result == 'failure' || needs.test.result == 'cancelled' || needs.build.result == 'failure' || needs.build.result == 'cancelled') }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout toolchain
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.DISTRIBUTION_REPO_TOKEN }}

      - name: Abort source release branch
        shell: bash
        run: scripts/abort-source-release.sh "${{ env.TOOL }}" "${{ inputs.version }}"

  finalize_source:
    name: Finalize source release
    needs:
      - prepare_source
      - build
    runs-on: ubuntu-latest

    outputs:
      source_tag: ${{ steps.finalize.outputs.tag }}

    steps:
      - name: Checkout source release branch
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare_source.outputs.release_branch }}
          fetch-depth: 0
          token: ${{ secrets.DISTRIBUTION_REPO_TOKEN }}

      - name: Configure Git identity
        run: |
          git config user.name "verzly-release-bot"
          git config user.email "release-bot@verzly.dev"

      - name: Merge source release and create source tag
        id: finalize
        shell: bash
        run: scripts/finalize-source-release.sh "${{ env.TOOL }}" "${{ inputs.version }}"

  publish_distribution:
    name: Publish distribution release
    needs:
      - finalize_source
      - build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout toolchain
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0
          token: ${{ secrets.DISTRIBUTION_REPO_TOKEN }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build local release tool
        run: cargo build --release -p github-release

      - name: Add local tools to PATH
        run: echo "${{ github.workspace }}/target/release" >> "${GITHUB_PATH}"

      - name: Download executable assets
        uses: actions/download-artifact@v4
        with:
          path: downloaded-assets

      - name: Normalize executable assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "release-assets/${{ env.TOOL }}"
          find downloaded-assets -type f -name "${{ env.TOOL }}-v${{ inputs.version }}-*" -exec cp {} "release-assets/${{ env.TOOL }}/" \;
          test -n "$(find "release-assets/${{ env.TOOL }}" -type f -print -quit)"

      - name: Clone distribution repository
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.DISTRIBUTION_REPO_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p distribution-repos
          gh repo clone "verzly/${{ env.TOOL }}" "distribution-repos/${{ env.TOOL }}"

      - name: Publish distribution repository
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.DISTRIBUTION_REPO_TOKEN }}
        run: |
          set -euo pipefail
          extra_args=()
          case "${{ inputs.prerelease }}" in
            true) extra_args+=(--prerelease true) ;;
            false) extra_args+=(--prerelease false) ;;
            auto) ;;
            *) echo "Unsupported prerelease mode: ${{ inputs.prerelease }}" >&2; exit 1 ;;
          esac
          scripts/release-distribution-repo.sh \
            "${{ env.TOOL }}" \
            "${{ inputs.version }}" \
            "release-assets" \
            "distribution-repos/${{ env.TOOL }}" \
            "crates/${{ env.TOOL }}/github-release.toml" \
            "${extra_args[@]}"
