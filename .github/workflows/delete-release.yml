name: Delete Release
run-name: Delete Verzly release ${{ inputs.version }}

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to delete without the v prefix. Example: 1.2.3."
        required: true
      confirm:
        description: "Type DELETE X.Y.Z to confirm destructive release and tag deletion."
        required: true

permissions:
  contents: write

concurrency:
  group: delete-verzly-release-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  delete:
    name: Delete release and tags
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ github.token }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Validate source ref
        env:
          REF_NAME: ${{ github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail
          if [ "${REF_NAME}" != "master" ]; then
            echo "::error::Delete Release must be run from master. Current ref: ${REF_NAME}"
            exit 1
          fi

      - name: Bootstrap Verzly from source
        run: |
          cargo build --release -p verzly
          echo "${{ github.workspace }}/.cache/rust/packages/toolchain/target/release" >> "${GITHUB_PATH}"

      - name: Delete Verzly release
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_VERSION: ${{ inputs.version }}
          CONFIRM: ${{ inputs.confirm }}
        shell: bash
        run: |
          set -euo pipefail

          version="${INPUT_VERSION}"
          if [[ "${version}" == v* ]]; then
            echo "::error::Version must be provided without the v prefix. Use '${version#v}' instead of '${version}'."
            exit 1
          fi
          if ! [[ "${version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Version must be a SemVer value without the v prefix, for example 1.2.3."
            exit 1
          fi

          expected_confirmation="DELETE ${version}"
          if [ "${CONFIRM}" != "${expected_confirmation}" ]; then
            echo "::error::Confirmation mismatch. Type '${expected_confirmation}' to delete release and tag data."
            exit 1
          fi

          verzly github-release delete \
            --config datarose.toml \
            --release-target verzly \
            --version "${version}"
