name: Update Floating Tags
run-name: Update Verzly floating tags

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "How to choose release tags for moving tag repair."
        required: true
        type: choice
        default: all
        options:
          - all
          - version
          - tag
      version:
        description: "Version to update when mode is version, with or without leading v."
        required: false
      tag:
        description: "Full release tag to analyze when mode is tag, for example v1.2.3 or v1.3.0-rc.1."
        required: false
      dry_run:
        description: "Print the tag updates without writing refs."
        required: false
        type: boolean
        default: false
      prune:
        description: "Delete stale or disabled floating tags while repairing."
        required: false
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: update-verzly-floating-tags-${{ inputs.mode }}-${{ inputs.version || inputs.tag || 'all' }}
  cancel-in-progress: false

jobs:
  update:
    name: Update Verzly floating tags
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ github.token }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Bootstrap Verzly from source
        run: |
          cargo build --release -p verzly
          echo "${{ github.workspace }}/.cache/rust/packages/toolchain/target/release" >> "${GITHUB_PATH}"

      - name: Update enabled floating tags
        env:
          GH_TOKEN: ${{ github.token }}
          MODE: ${{ inputs.mode }}
          VERSION: ${{ inputs.version }}
          TAG: ${{ inputs.tag }}
          DRY_RUN: ${{ inputs.dry_run }}
          PRUNE: ${{ inputs.prune }}
        shell: bash
        run: |
          set -euo pipefail

          args=(github-release floating-tags --config datarose.toml --release-target verzly)
          case "${MODE}" in
            all) args+=(--all) ;;
            version)
              if [ -z "${VERSION}" ]; then
                echo "::error::version is required when mode is version."
                exit 1
              fi
              args+=(--version "${VERSION#v}")
              ;;
            tag)
              if [ -z "${TAG}" ]; then
                echo "::error::tag is required when mode is tag."
                exit 1
              fi
              args+=(--tag "${TAG}")
              ;;
            *) echo "::error::Unsupported mode: ${MODE}"; exit 1 ;;
          esac

          if [ "${DRY_RUN}" = "true" ]; then
            args+=(--dry-run)
          fi
          if [ "${PRUNE}" = "true" ]; then
            args+=(--prune)
          fi

          verzly "${args[@]}"
