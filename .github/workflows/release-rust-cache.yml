name: Release Rust Cache
run-name: Release rust-cache ${{ inputs.version }}

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release, without the leading v."
        required: true
      prerelease:
        description: "Publish as a prerelease. Leave auto to infer from SemVer prerelease labels."
        required: false
        type: choice
        default: auto
        options:
          - auto
          - "true"
          - "false"

permissions:
  contents: write

jobs:
  release:
    uses: ./.github/workflows/_release-datarose-tool.yml
    with:
      tool: rust-cache
      version: ${{ inputs.version }}
      prerelease: ${{ inputs.prerelease }}
      cargo-release-config: crates/rust-cache/cargo-release.toml
      distribution-path: .codex/distributions/rust-cache
    secrets:
      DISTRIBUTION_REPO_TOKEN: ${{ secrets.DISTRIBUTION_REPO_TOKEN }}
