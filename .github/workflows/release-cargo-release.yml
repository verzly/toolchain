name: Release Cargo Release
run-name: Release cargo-release ${{ inputs.version }}

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release, without the leading v."
        required: true
      prerelease:
        description: "Publish as a prerelease. Leave auto to infer from SemVer prerelease labels."
        required: false
        type: choice
        default: auto
        options:
          - auto
          - "true"
          - "false"

permissions:
  contents: write

jobs:
  release:
    uses: ./.github/workflows/_release-datarose-tool.yml
    with:
      tool: cargo-release
      version: ${{ inputs.version }}
      prerelease: ${{ inputs.prerelease }}
      distribution-path: .codex/distributions/cargo-release
    secrets:
      DISTRIBUTION_REPO_TOKEN: ${{ secrets.DISTRIBUTION_REPO_TOKEN }}
