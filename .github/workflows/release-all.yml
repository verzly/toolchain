name: Release All
run-name: Release all ${{ inputs.version }}

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release for every public tool and the toolchain release, without the leading v."
        required: true
      prerelease:
        description: "Publish as a prerelease. Leave auto to infer from SemVer prerelease labels."
        required: false
        type: choice
        default: auto
        options:
          - auto
          - "true"
          - "false"

permissions:
  contents: write

concurrency:
  group: release-all-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  preflight:
    name: Release all preflight
    runs-on: ubuntu-latest

    steps:
      - name: Validate release token and target repositories
        env:
          GH_TOKEN: ${{ secrets.DISTRIBUTION_REPO_TOKEN }}
          REF_NAME: ${{ github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail
          if [ "${REF_NAME}" != "master" ]; then
            echo "::error::Release All must be run from master. Current ref: ${REF_NAME}"
            exit 1
          fi

          if [ -z "${GH_TOKEN:-}" ]; then
            echo "::error::DISTRIBUTION_REPO_TOKEN is required before running Release All because the workflow publishes to separate public distribution repositories."
            exit 1
          fi

          for repository in verzly/github-release verzly/cargo-release verzly/tauri-release verzly/rust-cache verzly/android-signing; do
            permission="$(gh api "repos/${repository}" --jq '.permissions.push // .permissions.admin // false')"
            if [ "${permission}" != "true" ]; then
              echo "::error::DISTRIBUTION_REPO_TOKEN cannot push to ${repository}."
              exit 1
            fi
          done

  github_release:
    name: Release github-release
    needs: preflight
    uses: ./.github/workflows/_release-tool.yml
    with:
      tool: github-release
      version: ${{ inputs.version }}
      prerelease: ${{ inputs.prerelease }}
    secrets:
      DISTRIBUTION_REPO_TOKEN: ${{ secrets.DISTRIBUTION_REPO_TOKEN }}

  cargo_release:
    name: Release cargo-release
    needs: github_release
    uses: ./.github/workflows/_release-tool.yml
    with:
      tool: cargo-release
      version: ${{ inputs.version }}
      prerelease: ${{ inputs.prerelease }}
    secrets:
      DISTRIBUTION_REPO_TOKEN: ${{ secrets.DISTRIBUTION_REPO_TOKEN }}

  tauri_release:
    name: Release tauri-release
    needs: cargo_release
    uses: ./.github/workflows/_release-tool.yml
    with:
      tool: tauri-release
      version: ${{ inputs.version }}
      prerelease: ${{ inputs.prerelease }}
    secrets:
      DISTRIBUTION_REPO_TOKEN: ${{ secrets.DISTRIBUTION_REPO_TOKEN }}

  rust_cache:
    name: Release rust-cache
    needs: tauri_release
    uses: ./.github/workflows/_release-tool.yml
    with:
      tool: rust-cache
      version: ${{ inputs.version }}
      prerelease: ${{ inputs.prerelease }}
    secrets:
      DISTRIBUTION_REPO_TOKEN: ${{ secrets.DISTRIBUTION_REPO_TOKEN }}

  android_signing:
    name: Release android-signing
    needs: rust_cache
    uses: ./.github/workflows/_release-tool.yml
    with:
      tool: android-signing
      version: ${{ inputs.version }}
      prerelease: ${{ inputs.prerelease }}
    secrets:
      DISTRIBUTION_REPO_TOKEN: ${{ secrets.DISTRIBUTION_REPO_TOKEN }}

  toolchain:
    name: Release toolchain
    needs: android_signing
    uses: ./.github/workflows/_release-toolchain.yml
    with:
      version: ${{ inputs.version }}
      prerelease: ${{ inputs.prerelease }}
