name: Release All
run-name: Release all ${{ inputs.version }}

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release for every public tool and the toolchain release, without the leading v."
        required: true
      prerelease:
        description: "Publish as a prerelease. Leave auto to infer from SemVer prerelease labels."
        required: false
        type: choice
        default: auto
        options:
          - auto
          - "true"
          - "false"

permissions:
  contents: write

concurrency:
  group: release-all-${{ inputs.version }}
  cancel-in-progress: false

env:
  TOOLCHAIN_REPOSITORY: verzly/toolchain
  TOOLS: github-release cargo-release tauri-release rust-cache android-signing repository

jobs:
  preflight:
    name: Release all preflight
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Validate release token and target repositories
        env:
          GH_TOKEN: ${{ secrets.DISTRIBUTION_REPO_TOKEN }}
          REF_NAME: ${{ github.ref_name }}
          VERSION: ${{ inputs.version }}
        shell: bash
        run: |
          set -euo pipefail

          if [ "${REF_NAME}" != "master" ]; then
            echo "::error::Release All must be run from master. Current ref: ${REF_NAME}"
            exit 1
          fi

          if [ -z "${GH_TOKEN:-}" ]; then
            echo "::error::DISTRIBUTION_REPO_TOKEN is required before running Release All because the workflow publishes to separate public distribution repositories."
            exit 1
          fi

          aggregate_branch="release/all-v${VERSION}"
          if git ls-remote --exit-code --heads origin "refs/heads/${aggregate_branch}" >/dev/null 2>&1; then
            echo "::notice::Deleting stale aggregate source release branch: ${aggregate_branch}"
            git push origin --delete "${aggregate_branch}"
          fi

          for tool in ${TOOLS}; do
            repository="verzly/${tool}"
            release_tag="v${VERSION}"
            source_tag="${tool}-v${VERSION}"

            permission="$(gh api "repos/${repository}" --jq '.permissions.push // .permissions.admin // false')"
            if [ "${permission}" != "true" ]; then
              echo "::error::DISTRIBUTION_REPO_TOKEN cannot push to ${repository}."
              exit 1
            fi

            if gh release view "${release_tag}" --repo "${repository}" >/dev/null 2>&1; then
              echo "::error::Release ${release_tag} already exists in ${repository}."
              exit 1
            fi

            if git ls-remote --exit-code --tags "https://x-access-token:${GH_TOKEN}@github.com/${repository}.git" "refs/tags/${release_tag}" >/dev/null 2>&1; then
              echo "::error::Tag ${release_tag} already exists in ${repository}."
              exit 1
            fi

            if git ls-remote --exit-code --tags origin "refs/tags/${source_tag}" >/dev/null 2>&1; then
              echo "::error::Source tag ${source_tag} already exists in ${TOOLCHAIN_REPOSITORY}."
              exit 1
            fi
          done

          if gh release view "v${VERSION}" --repo "${TOOLCHAIN_REPOSITORY}" >/dev/null 2>&1; then
            echo "::error::Toolchain release v${VERSION} already exists in ${TOOLCHAIN_REPOSITORY}."
            exit 1
          fi

  prepare_source_branch:
    name: Prepare aggregate source branch
    needs: preflight
    runs-on: ubuntu-latest
    outputs:
      release_branch: ${{ steps.release.outputs.release_branch }}

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ github.token }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Configure Git
        run: |
          git config user.name "verzly-release-bot"
          git config user.email "release-bot@verzly.dev"

      - name: Bootstrap github-release
        run: |
          cargo build --release -p github-release
          echo "${{ github.workspace }}/.cache/rust/packages/toolchain/target/release" >> "${GITHUB_PATH}"

      - name: Prepare source releases on one branch
        id: release
        env:
          VERSION: ${{ inputs.version }}
        shell: bash
        run: |
          set -euo pipefail

          release_branch="release/all-v${VERSION}"
          echo "release_branch=${release_branch}" >> "${GITHUB_OUTPUT}"

          for tool in ${TOOLS}; do
            github-release prepare \
              --config datarose.toml \
              --release-target "${tool}" \
              --version "${VERSION}" \
              --release-branch "${release_branch}" \
              --reuse-branch
          done
  test_sources:
    name: Test aggregate source branch
    needs: prepare_source_branch
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare_source_branch.outputs.release_branch }}
          fetch-depth: 0
          token: ${{ github.token }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --workspace --all-targets

  build_cargo_release:
    name: Build cargo-release assets
    needs:
      - prepare_source_branch
      - test_sources
    uses: ./.github/workflows/_release-build-assets.yml
    with:
      tool: cargo-release
      version: ${{ inputs.version }}
      ref: ${{ needs.prepare_source_branch.outputs.release_branch }}
      use_prebuilt_cargo_release: false

  build_assets:
    name: Build ${{ matrix.tool }} assets
    needs:
      - prepare_source_branch
      - build_cargo_release
    strategy:
      fail-fast: false
      matrix:
        tool:
          - github-release
          - tauri-release
          - rust-cache
          - android-signing
          - repository
    uses: ./.github/workflows/_release-build-assets.yml
    with:
      tool: ${{ matrix.tool }}
      version: ${{ inputs.version }}
      ref: ${{ needs.prepare_source_branch.outputs.release_branch }}
      use_prebuilt_cargo_release: true

  finalize_source_batch:
    name: Squash merge source branch and create source tags
    needs:
      - prepare_source_branch
      - build_cargo_release
      - build_assets
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ github.token }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Configure Git
        run: |
          git config user.name "verzly-release-bot"
          git config user.email "release-bot@verzly.dev"

      - name: Bootstrap github-release
        run: |
          cargo build --release -p github-release
          echo "${{ github.workspace }}/.cache/rust/packages/toolchain/target/release" >> "${GITHUB_PATH}"

      - name: Squash merge aggregate source branch and create source tags
        env:
          VERSION: ${{ inputs.version }}
          RELEASE_BRANCH: ${{ needs.prepare_source_branch.outputs.release_branch }}
        shell: bash
        run: |
          set -euo pipefail

          source_tag_args=()
          for tool in ${TOOLS}; do
            source_tag_args+=(--source-tag "${tool}-v${VERSION}")
          done

          github-release finalize-batch \
            --version "${VERSION}" \
            --release-branch "${RELEASE_BRANCH}" \
            "${source_tag_args[@]}"

  abort_sources:
    name: Abort aggregate source branch
    needs:
      - prepare_source_branch
      - test_sources
      - build_cargo_release
      - build_assets
      - finalize_source_batch
    if: ${{ always() && needs.prepare_source_branch.result == 'success' && (needs.test_sources.result == 'failure' || needs.test_sources.result == 'cancelled' || needs.build_cargo_release.result == 'failure' || needs.build_cargo_release.result == 'cancelled' || needs.build_assets.result == 'failure' || needs.build_assets.result == 'cancelled' || needs.finalize_source_batch.result == 'failure' || needs.finalize_source_batch.result == 'cancelled') }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ github.token }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Bootstrap github-release
        run: |
          cargo build --release -p github-release
          echo "${{ github.workspace }}/.cache/rust/packages/toolchain/target/release" >> "${GITHUB_PATH}"

      - name: Delete aggregate source release branch
        run: >-
          github-release abort
          --config datarose.toml
          --release-target github-release
          --release-branch "${{ needs.prepare_source_branch.outputs.release_branch }}"

  sync_distributions:
    name: Sync released distributions
    needs:
      - finalize_source_batch
      - build_cargo_release
      - build_assets
    uses: ./.github/workflows/sync-distributions.yml
    with:
      tool: all
      commit-message: "chore(distribution): bump public surface for v${{ inputs.version }} release"
      force-commit: true
    secrets:
      DISTRIBUTION_REPO_TOKEN: ${{ secrets.DISTRIBUTION_REPO_TOKEN }}

  publish_distributions:
    name: Publish ${{ matrix.tool }} distribution
    needs:
      - sync_distributions
      - build_cargo_release
      - build_assets
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        tool:
          - github-release
          - cargo-release
          - tauri-release
          - rust-cache
          - android-signing
          - repository

    steps:
      - uses: actions/checkout@v5
        with:
          ref: master
          fetch-depth: 0
          token: ${{ github.token }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Bootstrap github-release
        run: |
          cargo build --release -p github-release
          echo "${{ github.workspace }}/.cache/rust/packages/toolchain/target/release" >> "${GITHUB_PATH}"

      - uses: actions/download-artifact@v8
        with:
          pattern: ${{ matrix.tool }}-*
          path: downloaded-assets
          merge-multiple: true

      - name: Publish public release
        env:
          GH_TOKEN: ${{ secrets.DISTRIBUTION_REPO_TOKEN }}
        run: >-
          github-release publish
          --config datarose.toml
          --release-target "${{ matrix.tool }}"
          --version "${{ inputs.version }}"
          --assets "${{ github.workspace }}/downloaded-assets"
          --prerelease "${{ inputs.prerelease }}"

  toolchain:
    name: Release toolchain
    needs: publish_distributions
    uses: ./.github/workflows/_release-toolchain.yml
    with:
      version: ${{ inputs.version }}
      prerelease: ${{ inputs.prerelease }}
