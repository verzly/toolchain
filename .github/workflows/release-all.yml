name: Release All

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release for every public tool and the toolchain release, without the leading v."
        required: true
      prerelease:
        description: "Publish as a prerelease. Leave auto to infer from SemVer prerelease labels."
        required: false
        type: choice
        default: auto
        options:
          - auto
          - "true"
          - "false"

permissions:
  actions: write
  contents: read

concurrency:
  group: release-all-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  dispatch:
    name: Dispatch release workflows
    runs-on: ubuntu-latest

    steps:
      - name: Release tools in dependency order
        env:
          GH_TOKEN: ${{ secrets.DISTRIBUTION_REPO_TOKEN || github.token }}
          VERSION: ${{ inputs.version }}
          PRERELEASE: ${{ inputs.prerelease }}
          REF_NAME: ${{ github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail

          workflows=(
            "release-github-release.yml"
            "release-cargo-release.yml"
            "release-tauri-release.yml"
            "release-rust-cache.yml"
            "release-android-signing.yml"
            "release-toolchain.yml"
          )

          for workflow in "${workflows[@]}"; do
            echo "::group::${workflow}"
            echo "Dispatching ${workflow} for version ${VERSION} on ${REF_NAME}"
            gh workflow run "${workflow}" \
              --ref "${REF_NAME}" \
              -f "version=${VERSION}" \
              -f "prerelease=${PRERELEASE}"

            # GitHub creates the workflow run asynchronously. Wait briefly, then watch
            # the newest workflow_dispatch run for this workflow on the same branch.
            sleep 8
            run_id="$(gh run list \
              --workflow "${workflow}" \
              --branch "${REF_NAME}" \
              --event workflow_dispatch \
              --limit 1 \
              --json databaseId \
              --jq '.[0].databaseId')"

            if [ -z "${run_id}" ] || [ "${run_id}" = "null" ]; then
              echo "Could not find dispatched run for ${workflow}." >&2
              exit 1
            fi

            echo "Watching ${workflow} run ${run_id}"
            gh run watch "${run_id}" --exit-status
            echo "::endgroup::"
          done
