name: Release All
run-name: Release all ${{ inputs.version }}

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release for every configured target, without the leading v."
        required: true
      prerelease:
        description: "Publish as a prerelease. Leave auto to infer from SemVer prerelease labels."
        required: false
        type: choice
        default: auto
        options:
          - auto
          - "true"
          - "false"

permissions:
  contents: write

concurrency:
  group: release-all-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  summary:
    name: Release targets
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "Targets: github-release, cargo-release, tauri-release, rust-cache, android-signing, repo-quality"

  github_release:
    name: Release github-release
    needs: summary
    uses: ./.github/workflows/_release-datarose-tool.yml
    with:
      tool: github-release
      version: ${{ inputs.version }}
      prerelease: ${{ inputs.prerelease }}
      cargo-release-config: crates/github-release/cargo-release.toml
      distribution-path: .codex/distributions/github-release
    secrets:
      DISTRIBUTION_REPO_TOKEN: ${{ secrets.DISTRIBUTION_REPO_TOKEN }}

  cargo_release:
    name: Release cargo-release
    needs: summary
    uses: ./.github/workflows/_release-datarose-tool.yml
    with:
      tool: cargo-release
      version: ${{ inputs.version }}
      prerelease: ${{ inputs.prerelease }}
      cargo-release-config: crates/cargo-release/cargo-release.toml
      distribution-path: .codex/distributions/cargo-release
    secrets:
      DISTRIBUTION_REPO_TOKEN: ${{ secrets.DISTRIBUTION_REPO_TOKEN }}

  tauri_release:
    name: Release tauri-release
    needs: summary
    uses: ./.github/workflows/_release-datarose-tool.yml
    with:
      tool: tauri-release
      version: ${{ inputs.version }}
      prerelease: ${{ inputs.prerelease }}
      cargo-release-config: crates/tauri-release/cargo-release.toml
      distribution-path: .codex/distributions/tauri-release
    secrets:
      DISTRIBUTION_REPO_TOKEN: ${{ secrets.DISTRIBUTION_REPO_TOKEN }}

  rust_cache:
    name: Release rust-cache
    needs: summary
    uses: ./.github/workflows/_release-datarose-tool.yml
    with:
      tool: rust-cache
      version: ${{ inputs.version }}
      prerelease: ${{ inputs.prerelease }}
      cargo-release-config: crates/rust-cache/cargo-release.toml
      distribution-path: .codex/distributions/rust-cache
    secrets:
      DISTRIBUTION_REPO_TOKEN: ${{ secrets.DISTRIBUTION_REPO_TOKEN }}

  android_signing:
    name: Release android-signing
    needs: summary
    uses: ./.github/workflows/_release-datarose-tool.yml
    with:
      tool: android-signing
      version: ${{ inputs.version }}
      prerelease: ${{ inputs.prerelease }}
      cargo-release-config: crates/android-signing/cargo-release.toml
      distribution-path: .codex/distributions/android-signing
    secrets:
      DISTRIBUTION_REPO_TOKEN: ${{ secrets.DISTRIBUTION_REPO_TOKEN }}

  repo_quality:
    name: Release repo-quality
    needs: summary
    uses: ./.github/workflows/_release-datarose-tool.yml
    with:
      tool: repo-quality
      version: ${{ inputs.version }}
      prerelease: ${{ inputs.prerelease }}
      cargo-release-config: crates/repo-quality/cargo-release.toml
      distribution-path: .codex/distributions/repo-quality
    secrets:
      DISTRIBUTION_REPO_TOKEN: ${{ secrets.DISTRIBUTION_REPO_TOKEN }}

