name: Release All
run-name: Release all ${{ inputs.version }}

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release for every public tool and the toolchain release, without the leading v."
        required: true
      prerelease:
        description: "Publish as a prerelease. Leave auto to infer from SemVer prerelease labels."
        required: false
        type: choice
        default: auto
        options:
          - auto
          - "true"
          - "false"

permissions:
  actions: write
  contents: read

concurrency:
  group: release-all-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  dispatch:
    name: Dispatch release workflows
    runs-on: ubuntu-latest

    steps:
      - name: Validate release token and target repositories
        env:
          GH_TOKEN: ${{ secrets.DISTRIBUTION_REPO_TOKEN }}
          REF_NAME: ${{ github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail
          if [ "${REF_NAME}" != "master" ]; then
            echo "::error::Release All must be run from master. Current ref: ${REF_NAME}"
            exit 1
          fi

          if [ -z "${GH_TOKEN:-}" ]; then
            echo "::error::DISTRIBUTION_REPO_TOKEN is required before running Release All because the workflow publishes to separate public distribution repositories."
            exit 1
          fi

          for repository in verzly/github-release verzly/cargo-release verzly/tauri-release verzly/rust-cache verzly/android-signing; do
            permission="$(gh api "repos/${repository}" --jq '.permissions.push // .permissions.admin // false')"
            if [ "${permission}" != "true" ]; then
              echo "::error::DISTRIBUTION_REPO_TOKEN cannot push to ${repository}."
              exit 1
            fi
          done

      - name: Release tools in dependency order
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          VERSION: ${{ inputs.version }}
          PRERELEASE: ${{ inputs.prerelease }}
          REF_NAME: ${{ github.ref_name }}
          PARENT_RUN_ID: ${{ github.run_id }}
        shell: bash
        run: |
          set -euo pipefail

          workflows=(
            "release-github-release.yml"
            "release-cargo-release.yml"
            "release-tauri-release.yml"
            "release-rust-cache.yml"
            "release-android-signing.yml"
            "release-toolchain.yml"
          )

          for workflow in "${workflows[@]}"; do
            echo "::group::${workflow}"
            run_key="release-all-${PARENT_RUN_ID}-${workflow}-${VERSION}"
            echo "Dispatching ${workflow} for version ${VERSION} on ${REF_NAME} (${run_key})"

            gh workflow run "${workflow}" \
              --repo "${REPO}" \
              --ref "${REF_NAME}" \
              -f "version=${VERSION}" \
              -f "prerelease=${PRERELEASE}" \
              -f "orchestrator=${run_key}"

            run_id=""
            for _ in {1..30}; do
              run_id="$(gh run list \
                --repo "${REPO}" \
                --workflow "${workflow}" \
                --branch "${REF_NAME}" \
                --event workflow_dispatch \
                --limit 30 \
                --json databaseId,displayTitle \
                | jq -r --arg key "${run_key}" '.[] | select(.displayTitle | contains($key)) | .databaseId' \
                | head -n 1)"

              if [ -n "${run_id}" ] && [ "${run_id}" != "null" ]; then
                break
              fi

              sleep 4
            done

            if [ -z "${run_id}" ] || [ "${run_id}" = "null" ]; then
              echo "::error::Could not find dispatched run for ${workflow} with key ${run_key}."
              exit 1
            fi

            echo "Watching ${workflow} run ${run_id}"
            gh run watch "${run_id}" --repo "${REPO}" --exit-status
            echo "::endgroup::"
          done
