name: Release Build Assets

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      ref:
        required: true
        type: string
      release-target:
        required: false
        type: string
        default: verzly

permissions:
  contents: read

jobs:
  build:
    name: Build Verzly for ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        target:
          - linux-x64
          - macos-x64
          - macos-arm64
          - windows-x64
        include:
          - os: ubuntu-latest
            target: linux-x64
          - os: macos-15-intel
            target: macos-x64
          - os: macos-14
            target: macos-arm64
          - os: windows-latest
            target: windows-x64

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0
          token: ${{ github.token }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Bootstrap Verzly from source
        shell: bash
        run: |
          cargo build --release -p verzly
          echo "${{ github.workspace }}/.cache/rust/packages/toolchain/target/release" >> "${GITHUB_PATH}"

      - name: Build executable assets
        shell: bash
        run: >-
          verzly cargo-release build
          --config datarose.toml
          --release-target "${{ inputs.release-target }}"
          --version "${{ inputs.version }}"
          --target "${{ matrix.target }}"

      - uses: actions/upload-artifact@v7
        with:
          name: verzly-${{ matrix.target }}
          path: dist/verzly/**/*
          if-no-files-found: error
