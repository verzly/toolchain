name: Test

on:
  push:
  pull_request:

jobs:
  rust:
    name: Rust workspace
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace --all-targets

  repository-model:
    name: Repository model
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate repository boundaries
        shell: bash
        run: |
          set -euo pipefail
          test ! -d "_repos"
          test ! -d "distribution"
          for tool in github-release cargo-release tauri-release rust-cache android-signing; do
            test -f "crates/${tool}/Cargo.toml"
            test -f "crates/${tool}/github-release.toml"
            grep -q "source_repository = \"verzly/toolchain\"" "crates/${tool}/github-release.toml"
            grep -q "target_repository = \"verzly/${tool}\"" "crates/${tool}/github-release.toml"
            grep -q "source_tag_prefix = \"${tool}-v\"" "crates/${tool}/github-release.toml"
            grep -q "tag_prefix = \"v\"" "crates/${tool}/github-release.toml"
          done
