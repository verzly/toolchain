name: Test

on:
  pull_request:
    branches:
      - master
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref_name }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust workspace
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace --all-targets

  repository-model:
    name: Repository model
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Validate repository boundaries
        shell: bash
        run: |
          set -euo pipefail
          test ! -d "_repos"
          test ! -d "distribution"
          test ! -d "scripts"
          test -f "Cargo.lock"
          test -f "github-release.toml"
          test -f "rust-cache.toml"
          test -f ".cargo/config.toml"
          grep -Fq '/_repos/' ".gitignore"
          test ! -f "crates/rust-cache/rust-cache.toml"
          grep -Fq 'target-dir = ".cache/rust/packages/toolchain/target"' ".cargo/config.toml"
          grep -Fq 'target_dir = "rust/packages/{package}/target"' "rust-cache.toml"
          ! grep -R -Fq "rust-cache run" ".github/workflows"
          test -f ".github/workflows/_release-toolchain.yml"
          test -f ".github/workflows/release-toolchain.yml"
          test -f ".github/workflows/release-all.yml"
          grep -Fq 'DISTRIBUTION_REPO_TOKEN:' ".github/workflows/_release-tool.yml"
          grep -Fq 'required: false' ".github/workflows/_release-tool.yml"
          grep -Fq 'GH_TOKEN: ${{ secrets.DISTRIBUTION_REPO_TOKEN }}' ".github/workflows/_release-tool.yml"
          grep -Fq 'DISTRIBUTION_REPO_TOKEN is required' ".github/workflows/release-all.yml"
          grep -Fq 'Release All must be run from master' ".github/workflows/release-all.yml"
          grep -Fq 'Release workflows must be run from master' ".github/workflows/_release-tool.yml"
          grep -Fq 'git ls-remote --exit-code --tags' ".github/workflows/_release-tool.yml"
          grep -Fq 'REPO: ${{ github.repository }}' ".github/workflows/release-all.yml"
          grep -Fq 'orchestrator=${run_key}' ".github/workflows/release-all.yml"
          grep -Fq 'jq -r --arg key "${run_key}"' ".github/workflows/release-all.yml"
          grep -Fq 'cargo metadata --format-version 1 --no-deps' ".github/workflows/_release-tool.yml"
          ! grep -Fq 'source/_repos' ".github/workflows/_release-tool.yml"
          ! grep -Fq 'rsync -a --delete' ".github/workflows/_release-tool.yml"
          grep -Fq 'github-release publish' ".github/workflows/_release-tool.yml"
          ! grep -Fq 'secrets.DISTRIBUTION_REPO_TOKEN || github.token' \
            ".github/workflows/_release-tool.yml" \
            ".github/workflows/_release-toolchain.yml" \
            ".github/workflows/release-all.yml" \
            ".github/workflows/release-android-signing.yml" \
            ".github/workflows/release-cargo-release.yml" \
            ".github/workflows/release-github-release.yml" \
            ".github/workflows/release-rust-cache.yml" \
            ".github/workflows/release-tauri-release.yml" \
            ".github/workflows/release-toolchain.yml"
          grep -Fq "target_repository = \"verzly/toolchain\"" "github-release.toml"
          grep -Fq "tag_prefix = \"v\"" "github-release.toml"
          for tool in github-release cargo-release tauri-release rust-cache android-signing; do
            test -f "crates/${tool}/Cargo.toml"
            test ! -f "crates/${tool}/README.md"
            test ! -f "crates/${tool}/source-github-release.toml"
            test -f "crates/${tool}/github-release.toml"
            test -f "crates/${tool}/cargo-release.toml"
            grep -Fq "target_repository = \"verzly/${tool}\"" "crates/${tool}/github-release.toml"
            grep -Fq "source_repository = \"verzly/toolchain\"" "crates/${tool}/github-release.toml"
            grep -Fq "[source_release]" "crates/${tool}/github-release.toml"
            grep -Fq "tag_prefix = \"${tool}-v\"" "crates/${tool}/github-release.toml"
            grep -Fq "path = \"crates/${tool}/Cargo.toml\"" "crates/${tool}/github-release.toml"
            grep -Fq "tag_prefix = \"v\"" "crates/${tool}/github-release.toml"
            grep -Fq "mode = \"scoped\"" "crates/${tool}/github-release.toml"
            grep -Fq "include_paths = [\"crates/${tool}/\"]" "crates/${tool}/github-release.toml"
            grep -R -Fq "#[cfg(test)]" "crates/${tool}/src"
          done
