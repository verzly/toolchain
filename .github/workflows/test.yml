name: Test

on:
  push:
  pull_request:

jobs:
  rust:
    name: Rust workspace
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Bootstrap cache helper
        run: |
          cargo build --release -p rust-cache
          echo "${{ github.workspace }}/target/release" >> "${GITHUB_PATH}"

      - name: Format
        run: rust-cache run --config crates/rust-cache/rust-cache.toml -- cargo fmt --all -- --check

      - name: Clippy
        run: rust-cache run --config crates/rust-cache/rust-cache.toml -- cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: rust-cache run --config crates/rust-cache/rust-cache.toml -- cargo test --workspace --all-targets

  repository-model:
    name: Repository model
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate repository boundaries
        shell: bash
        run: |
          set -euo pipefail
          test ! -d "_repos"
          test ! -d "distribution"
          test ! -d "scripts"
          for tool in github-release cargo-release tauri-release rust-cache android-signing; do
            test -f "crates/${tool}/Cargo.toml"
            test -f "crates/${tool}/source-github-release.toml"
            test -f "crates/${tool}/github-release.toml"
            test -f "crates/${tool}/cargo-release.toml"
            grep -q "target_repository = \"verzly/${tool}\"" "crates/${tool}/github-release.toml"
            grep -q "source_repository = \"verzly/toolchain\"" "crates/${tool}/github-release.toml"
            grep -q "tag_prefix = \"${tool}-v\"" "crates/${tool}/source-github-release.toml"
            grep -q "tag_prefix = \"v\"" "crates/${tool}/github-release.toml"
          done
