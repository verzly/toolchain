name: Test

on:
  push:
  pull_request:

jobs:
  rust:
    name: Rust workspace
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace --all-targets

  distribution-templates:
    name: Distribution templates
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate distribution repositories
        shell: bash
        run: |
          set -euo pipefail
          for tool in github-release cargo-release tauri-release rust-cache android-signing; do
            test -f "distribution/${tool}/README.md"
            test -f "distribution/${tool}/action.yml"
            test -f "distribution/${tool}/github-release.toml"
            test -f "distribution/${tool}/VERSION"
            test ! -d "distribution/${tool}/src"
            test ! -f "distribution/${tool}/Cargo.toml"
            grep -q "github.action_repository" "distribution/${tool}/action.yml"
            grep -q "source_repository = \"verzly/toolchain\"" "distribution/${tool}/github-release.toml"
          done
