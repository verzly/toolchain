name: Release Tool

on:
  workflow_call:
    inputs:
      tool:
        required: true
        type: string
      version:
        required: true
        type: string
      prerelease:
        required: false
        type: string
        default: auto
    secrets:
      DISTRIBUTION_REPO_TOKEN:
        required: false

permissions:
  contents: write

concurrency:
  group: release-${{ inputs.tool }}-${{ inputs.version }}
  cancel-in-progress: false

env:
  SOURCE_REPOSITORY: verzly/toolchain
  TARGET_REPOSITORY: verzly/${{ inputs.tool }}
  RELEASE_TAG: v${{ inputs.version }}

jobs:
  preflight:
    name: Preflight
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Validate release inputs and repository access
        env:
          GH_TOKEN: ${{ secrets.DISTRIBUTION_REPO_TOKEN }}
          TOOL: ${{ inputs.tool }}
          TARGET_REPOSITORY: verzly/${{ inputs.tool }}
          RELEASE_TAG: v${{ inputs.version }}
          SOURCE_REF_NAME: ${{ github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail

          if [ "${SOURCE_REF_NAME}" != "master" ]; then
            echo "::error::Release workflows must be run from master. Current ref: ${SOURCE_REF_NAME}"
            exit 1
          fi

          case "${TOOL}" in
            github-release|cargo-release|tauri-release|rust-cache|android-signing|repository) ;;
            *) echo "::error::Unsupported tool: ${TOOL}"; exit 1 ;;
          esac

          if [ -z "${GH_TOKEN:-}" ]; then
            echo "::error::DISTRIBUTION_REPO_TOKEN is required because this workflow publishes releases and assets to ${TARGET_REPOSITORY}. Public repositories are public for reading, but creating tags, creating releases, and uploading assets still require write access."
            exit 1
          fi

          permission="$(gh api "repos/${TARGET_REPOSITORY}" --jq '.permissions.push // .permissions.admin // false')"
          if [ "${permission}" != "true" ]; then
            echo "::error::DISTRIBUTION_REPO_TOKEN cannot push to ${TARGET_REPOSITORY}. Use a classic PAT with repo access, a fine-grained PAT with Contents read/write for all distribution repositories, or a GitHub App installation token."
            exit 1
          fi

          if gh release view "${RELEASE_TAG}" --repo "${TARGET_REPOSITORY}" >/dev/null 2>&1; then
            echo "::error::Release ${RELEASE_TAG} already exists in ${TARGET_REPOSITORY}. Re-run a publish-only recovery flow instead of creating a second source release."
            exit 1
          fi

          if git ls-remote --exit-code --tags "https://x-access-token:${GH_TOKEN}@github.com/${TARGET_REPOSITORY}.git" "refs/tags/${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "::error::Tag ${RELEASE_TAG} already exists in ${TARGET_REPOSITORY}."
            exit 1
          fi

  prepare_source:
    name: Prepare source
    needs: preflight
    runs-on: ubuntu-latest
    outputs:
      release_branch: ${{ steps.prepare.outputs.release_branch }}
      source_tag: ${{ steps.prepare.outputs.tag }}

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ github.token }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Configure Git
        run: |
          git config user.name "verzly-release-bot"
          git config user.email "release-bot@verzly.dev"

      - name: Bootstrap github-release
        run: |
          cargo build --release -p github-release
          echo "${{ github.workspace }}/.cache/rust/packages/toolchain/target/release" >> "${GITHUB_PATH}"

      - name: Prepare source release
        id: prepare
        run: >-
          github-release prepare
          --config datarose.toml
          --release-target "${{ inputs.tool }}"
          --version "${{ inputs.version }}"


  test:
    name: Test source
    needs: prepare_source
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare_source.outputs.release_branch }}
          fetch-depth: 0
          token: ${{ github.token }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --workspace --all-targets

  build:
    name: Build assets
    needs:
      - prepare_source
      - test
    uses: ./.github/workflows/_release-build-assets.yml
    with:
      tool: ${{ inputs.tool }}
      version: ${{ inputs.version }}
      ref: ${{ needs.prepare_source.outputs.release_branch }}
      use_prebuilt_cargo_release: false

  abort_source:
    name: Abort source
    needs:
      - prepare_source
      - test
      - build
    if: ${{ always() && needs.prepare_source.result == 'success' && (needs.test.result == 'failure' || needs.test.result == 'cancelled' || needs.build.result == 'failure' || needs.build.result == 'cancelled') }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ github.token }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Bootstrap github-release
        run: |
          cargo build --release -p github-release
          echo "${{ github.workspace }}/.cache/rust/packages/toolchain/target/release" >> "${GITHUB_PATH}"

      - name: Delete source release branch
        run: >-
          github-release abort
          --config datarose.toml
          --release-target "${{ inputs.tool }}"
          --version "${{ inputs.version }}"

  finalize_source:
    name: Finalize source
    needs:
      - prepare_source
      - build
    runs-on: ubuntu-latest
    outputs:
      source_tag: ${{ steps.finalize.outputs.tag }}

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare_source.outputs.release_branch }}
          fetch-depth: 0
          token: ${{ github.token }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Configure Git
        run: |
          git config user.name "verzly-release-bot"
          git config user.email "release-bot@verzly.dev"

      - name: Bootstrap github-release
        run: |
          cargo build --release -p github-release
          echo "${{ github.workspace }}/.cache/rust/packages/toolchain/target/release" >> "${GITHUB_PATH}"

      - name: Merge and tag source release
        id: finalize
        run: >-
          github-release finalize
          --config datarose.toml
          --release-target "${{ inputs.tool }}"
          --version "${{ inputs.version }}"
          --merge-strategy squash
          --skip-github-release

  sync_distribution:
    name: Sync distribution
    needs:
      - finalize_source
      - build
    uses: ./.github/workflows/sync-distributions.yml
    with:
      tool: ${{ inputs.tool }}
      commit-message: "chore(distribution): bump public surface for v${{ inputs.version }} release"
      force-commit: true
    secrets:
      DISTRIBUTION_REPO_TOKEN: ${{ secrets.DISTRIBUTION_REPO_TOKEN }}

  publish_distribution:
    name: Publish distribution
    needs:
      - sync_distribution
      - build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source repository
        uses: actions/checkout@v5
        with:
          path: source
          ref: master
          fetch-depth: 0
          token: ${{ github.token }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Bootstrap github-release
        working-directory: source
        run: |
          cargo build --release -p github-release
          echo "${{ github.workspace }}/source/.cache/rust/packages/toolchain/target/release" >> "${GITHUB_PATH}"

      - uses: actions/download-artifact@v8
        with:
          path: downloaded-assets

      - name: Prepare public release assets
        env:
          TOOL: ${{ inputs.tool }}
          VERSION: ${{ inputs.version }}
        shell: bash
        run: |
          set -euo pipefail

          python3 <<'PY'
          import hashlib
          import os
          import shutil
          import stat
          import tarfile
          import zipfile
          from pathlib import Path

          tool = os.environ["TOOL"]
          version = os.environ["VERSION"].removeprefix("v")
          source_root = Path("downloaded-assets")
          release_root = Path("release-assets")
          release_root.mkdir(parents=True, exist_ok=True)

          if not source_root.exists():
              raise SystemExit("downloaded-assets does not exist")

          shutil.copytree(source_root, release_root / "raw", dirs_exist_ok=True)

          targets = {
              "linux-x64": {"ext": "", "archive": "tar.gz"},
              "macos-x64": {"ext": "", "archive": "tar.gz"},
              "macos-arm64": {"ext": "", "archive": "tar.gz"},
              "windows-x64": {"ext": ".exe", "archive": "zip"},
          }

          archive_paths = []

          def find_executable(target: str, ext: str) -> Path:
              expected = f"{tool}-v{version}-{target}{ext}"
              matches = sorted(source_root.rglob(expected))
              matches = [path for path in matches if path.is_file()]
              if len(matches) != 1:
                  formatted = "\n".join(str(path) for path in matches) or "<none>"
                  raise SystemExit(
                      f"expected exactly one executable asset named {expected}, found {len(matches)}:\n{formatted}"
                  )
              return matches[0]

          def write_sha256(path: Path) -> None:
              digest = hashlib.sha256(path.read_bytes()).hexdigest()
              path.with_name(f"{path.name}.sha256").write_text(f"{digest}  {path.name}\n")

          for target, spec in targets.items():
              executable = find_executable(target, spec["ext"])
              if spec["archive"] == "zip":
                  archive = release_root / f"{tool}-v{version}-{target}.zip"
                  with zipfile.ZipFile(archive, "w", compression=zipfile.ZIP_DEFLATED) as zip_file:
                      info = zipfile.ZipInfo(f"{tool}{spec['ext']}")
                      info.external_attr = 0o755 << 16
                      zip_file.writestr(info, executable.read_bytes())
              else:
                  archive = release_root / f"{tool}-v{version}-{target}.tar.gz"
                  with tarfile.open(archive, "w:gz") as tar:
                      info = tar.gettarinfo(str(executable), arcname=tool)
                      info.mode = stat.S_IRUSR | stat.S_IWUSR | stat.S_IXUSR | stat.S_IRGRP | stat.S_IXGRP | stat.S_IROTH | stat.S_IXOTH
                      with executable.open("rb") as file:
                          tar.addfile(info, file)

              write_sha256(archive)
              archive_paths.append(archive)

          checksum_lines = []
          for archive in archive_paths:
              digest = hashlib.sha256(archive.read_bytes()).hexdigest()
              checksum_lines.append(f"{digest}  {archive.name}\n")
          (release_root / "checksums.txt").write_text("".join(checksum_lines))
          PY

      - name: Publish public release
        working-directory: source
        env:
          GH_TOKEN: ${{ secrets.DISTRIBUTION_REPO_TOKEN }}
        run: >-
          github-release publish
          --config datarose.toml
          --release-target "${{ inputs.tool }}"
          --version "${{ inputs.version }}"
          --assets "${{ github.workspace }}/release-assets"
          --prerelease "${{ inputs.prerelease }}"
