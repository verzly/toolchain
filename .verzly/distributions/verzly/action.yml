name: Verzly Toolchain
description: Install and optionally run the unified verzly executable.
author: Verzly

inputs:
  github-token:
    description: Token used to read release assets. The default GitHub token is enough for public releases.
    required: false
    default: ""
  version:
    description: GitHub Release tag to download. Use 1.2.3, v1.2.3, latest, next, v1, or v1.2. Leave empty to use the action ref when it is a release selector, otherwise the latest release.
    required: false
    default: ""
  release-repository:
    description: Repository that publishes the verzly executable assets.
    required: false
    default: verzly/verzly
  install-only:
    description: Install verzly and add it to PATH without running it.
    required: false
    default: "false"
  tool:
    description: Optional tool subcommand to run, for example github-release, tauri-release, ios-signing, or repository.
    required: false
    default: ""
  args:
    description: Arguments passed to verzly, or to the selected tool when tool is set.
    required: false
    default: "--help"
  working-directory:
    description: Directory where verzly should run.
    required: false
    default: "."

outputs:
  bin-path:
    description: Absolute path to the installed verzly executable.
    value: ${{ steps.install.outputs.bin-path }}
  host-target:
    description: Release target used to select the executable asset.
    value: ${{ steps.host.outputs.host-target }}
  tool-version:
    description: Version output from the installed executable.
    value: ${{ steps.install.outputs.tool-version }}
  release-tag:
    description: Release tag used to download the executable. Empty means GitHub latest release resolution was used.
    value: ${{ steps.install.outputs.release-tag }}

runs:
  using: composite
  steps:
    - name: Resolve host target
      id: host
      shell: bash
      run: |
        set -euo pipefail

        EXT=""
        case "${{ runner.os }}" in
          Linux)
            ARCH="$(uname -m)"
            case "${ARCH}" in
              x86_64|amd64) HOST="linux-x64" ;;
              aarch64|arm64) echo "::error::Linux ARM64 assets are not published yet."; exit 1 ;;
              *) echo "::error::Unsupported Linux architecture: ${ARCH}"; exit 1 ;;
            esac
            ;;
          macOS)
            ARCH="$(uname -m)"
            case "${ARCH}" in
              x86_64|amd64) HOST="macos-x64" ;;
              aarch64|arm64) HOST="macos-arm64" ;;
              *) echo "::error::Unsupported macOS architecture: ${ARCH}"; exit 1 ;;
            esac
            ;;
          Windows)
            EXT=".exe"
            ARCH="${PROCESSOR_ARCHITECTURE:-AMD64}"
            case "${ARCH}" in
              AMD64|amd64|x86_64) HOST="windows-x64" ;;
              ARM64|arm64|aarch64) echo "::error::Windows ARM64 assets are not published yet."; exit 1 ;;
              *) echo "::error::Unsupported Windows architecture: ${ARCH}"; exit 1 ;;
            esac
            ;;
          *)
            echo "::error::Unsupported runner OS: ${{ runner.os }}"
            exit 1
            ;;
        esac

        echo "host-target=${HOST}" >> "${GITHUB_OUTPUT}"
        echo "extension=${EXT}" >> "${GITHUB_OUTPUT}"

    - name: Install verzly
      id: install
      shell: bash
      env:
        INPUT_TOKEN: ${{ inputs.github-token }}
        DEFAULT_TOKEN: ${{ github.token }}
        ACTION_REF: ${{ github.action_ref }}
        VERSION: ${{ inputs.version }}
        RELEASE_REPOSITORY: ${{ inputs.release-repository }}
        HOST: ${{ steps.host.outputs.host-target }}
        EXT: ${{ steps.host.outputs.extension }}
      run: |
        set -euo pipefail

        if ! command -v gh >/dev/null 2>&1; then
          echo "::error::The GitHub CLI is required to download release assets. GitHub-hosted runners include it by default."
          exit 1
        fi

        TOKEN="${INPUT_TOKEN:-}"
        if [ -z "${TOKEN}" ]; then
          TOKEN="${DEFAULT_TOKEN:-}"
        fi
        if [ -z "${TOKEN}" ]; then
          echo "::error::No GitHub token is available. Pass github-token explicitly."
          exit 1
        fi
        export GH_TOKEN="${TOKEN}"

        REPOSITORY="${RELEASE_REPOSITORY:-verzly/verzly}"
        TOOL_DIR="${RUNNER_TEMP}/verzly-action"
        BIN_DIR="${RUNNER_TEMP}/verzly-bin"
        PATTERN="verzly-v*-${HOST}${EXT}"

        normalize_release_selector() {
          local selector="$1"
          if [[ "${selector}" =~ ^[0-9]+([.][0-9]+){0,2}([-+].*)?$ ]]; then
            selector="v${selector}"
          fi
          printf '%s\n' "${selector}"
        }

        is_action_ref_release_selector() {
          local selector="$1"
          case "${selector}" in
            latest|next) return 0 ;;
          esac
          [[ "${selector}" =~ ^v[0-9]+([.][0-9]+){0,2}([-+].*)?$ ]]
        }

        is_exact_release_tag() {
          local selector="$1"
          [[ "${selector}" =~ ^v[0-9]+[.][0-9]+[.][0-9]+([-+][0-9A-Za-z.-]+)?$ ]]
        }

        release_has_asset() {
          local tag="$1"
          local pattern="$2"
          local assets=""
          if ! assets="$(gh release view "${tag}" --repo "${REPOSITORY}" --json assets --jq '.assets[].name' 2>/dev/null)"; then
            return 1
          fi
          while IFS= read -r asset; do
            case "${asset}" in
              ${pattern}) return 0 ;;
            esac
          done <<< "${assets}"
          return 1
        }

        resolve_tag_commit_sha() {
          local tag="$1"
          local object_sha=""
          local object_type=""
          read -r object_sha object_type < <(
            gh api "repos/${REPOSITORY}/git/ref/tags/${tag}" --jq '.object | "\(.sha) \(.type)"'
          )
          for _ in 1 2 3 4 5 6 7 8; do
            case "${object_type}" in
              commit) printf '%s\n' "${object_sha}"; return 0 ;;
              tag)
                read -r object_sha object_type < <(
                  gh api "repos/${REPOSITORY}/git/tags/${object_sha}" --jq '.object | "\(.sha) \(.type)"'
                )
                ;;
              *) echo "::error::Tag ${tag} in ${REPOSITORY} resolves to unsupported Git object type: ${object_type}."; return 1 ;;
            esac
          done
          echo "::error::Tag ${tag} in ${REPOSITORY} contains too many nested tag objects."
          return 1
        }

        candidate_prefix_for_selector() {
          local selector="$1"
          case "${selector}" in
            latest) printf 'v\n'; return 0 ;;
            next) printf 'v\n'; return 0 ;;
          esac
          if [[ "${selector}" =~ ^v([0-9]+)$ ]]; then
            printf 'v%s.\n' "${BASH_REMATCH[1]}"; return 0
          fi
          if [[ "${selector}" =~ ^v([0-9]+)[.]([0-9]+)$ ]]; then
            printf 'v%s.%s.\n' "${BASH_REMATCH[1]}" "${BASH_REMATCH[2]}"; return 0
          fi
          printf '%s\n' "${selector}"
        }

        semver_sort_key() {
          local tag="$1"
          local version="${tag#v}"
          local stable=1
          local qualifier_key="~"
          if [[ ! "${version}" =~ ^([0-9]+)[.]([0-9]+)[.]([0-9]+)([-+][0-9A-Za-z.-]+)?$ ]]; then
            return 1
          fi
          if [[ "${BASH_REMATCH[4]:-}" == -* ]]; then
            stable=0
            qualifier_key="${BASH_REMATCH[4]#-}"
          fi
          printf '%010d.%010d.%010d.%d.%s\n' \
            "$((10#${BASH_REMATCH[1]}))" \
            "$((10#${BASH_REMATCH[2]}))" \
            "$((10#${BASH_REMATCH[3]}))" \
            "${stable}" \
            "${qualifier_key}"
        }

        resolve_release_tag_for_selector() {
          local selector="$1"
          local pattern="$2"
          local selector_sha=""
          local prefix=""
          local best=""
          local candidate=""
          local candidate_sha=""
          local key=""

          if [ -z "${selector}" ] || [ "${selector}" = "latest" ]; then
            return 0
          fi

          if is_exact_release_tag "${selector}" && release_has_asset "${selector}" "${pattern}"; then
            printf '%s\n' "${selector}"
            return 0
          fi

          selector_sha="$(resolve_tag_commit_sha "${selector}")"
          prefix="$(candidate_prefix_for_selector "${selector}")"

          while IFS= read -r candidate; do
            candidate="${candidate#refs/tags/}"
            if ! key="$(semver_sort_key "${candidate}")"; then
              continue
            fi
            if ! candidate_sha="$(resolve_tag_commit_sha "${candidate}" 2>/dev/null)"; then
              continue
            fi
            if [ "${candidate_sha}" != "${selector_sha}" ]; then
              continue
            fi
            if ! release_has_asset "${candidate}" "${pattern}"; then
              continue
            fi
            best="$(printf '%s\n%s\t%s' "${best}" "${key}" "${candidate}" | sed '/^$/d' | sort | tail -n 1)"
          done < <(gh api --paginate "repos/${REPOSITORY}/git/matching-refs/tags/${prefix}" --jq '.[].ref')

          if [ -n "${best}" ]; then
            printf '%s\n' "${best##*$'\t'}"
            return 0
          fi

          echo "::error::Could not resolve ${REPOSITORY}@${selector} to a release tag containing asset pattern ${pattern}."
          return 1
        }

        TAG="${VERSION}"
        if [ -n "${TAG}" ]; then
          TAG="$(normalize_release_selector "${TAG}")"
        elif [ -n "${ACTION_REF:-}" ] && is_action_ref_release_selector "${ACTION_REF}"; then
          TAG="$(normalize_release_selector "${ACTION_REF}")"
        fi

        RELEASE_TAG="$(resolve_release_tag_for_selector "${TAG}" "${PATTERN}")"

        rm -rf "${TOOL_DIR}" "${BIN_DIR}"
        mkdir -p "${TOOL_DIR}" "${BIN_DIR}"

        if [ -n "${RELEASE_TAG}" ]; then
          if [ "${RELEASE_TAG}" != "${TAG}" ]; then
            echo "Resolved ${REPOSITORY}@${TAG} to release ${RELEASE_TAG}."
          fi
          echo "Downloading ${PATTERN} from ${REPOSITORY} release ${RELEASE_TAG}"
          gh release download "${RELEASE_TAG}" --repo "${REPOSITORY}" --pattern "${PATTERN}" --dir "${TOOL_DIR}"
          gh release download "${RELEASE_TAG}" --repo "${REPOSITORY}" --pattern "${PATTERN}.sha256" --dir "${TOOL_DIR}" || true
        else
          echo "Downloading ${PATTERN} from ${REPOSITORY} latest release"
          gh release download --repo "${REPOSITORY}" --pattern "${PATTERN}" --dir "${TOOL_DIR}"
          gh release download --repo "${REPOSITORY}" --pattern "${PATTERN}.sha256" --dir "${TOOL_DIR}" || true
        fi

        TOOL="$(find "${TOOL_DIR}" -maxdepth 1 -type f -name "${PATTERN}" | sort | tail -n 1)"
        if [ -z "${TOOL}" ]; then
          echo "::error::No verzly executable matched ${PATTERN} in ${REPOSITORY}."
          find "${TOOL_DIR}" -maxdepth 1 -type f -print || true
          exit 1
        fi

        CHECKSUM="${TOOL}.sha256"
        if [ -f "${CHECKSUM}" ]; then
          if command -v sha256sum >/dev/null 2>&1; then
            (cd "$(dirname "${TOOL}")" && sha256sum -c "$(basename "${CHECKSUM}")")
          elif command -v shasum >/dev/null 2>&1; then
            (cd "$(dirname "${TOOL}")" && shasum -a 256 -c "$(basename "${CHECKSUM}")")
          else
            echo "::warning::Checksum file is present but no SHA-256 checker is available."
          fi
        fi

        cp "${TOOL}" "${BIN_DIR}/verzly${EXT}"
        if [ "${{ runner.os }}" != "Windows" ]; then
          chmod 755 "${BIN_DIR}/verzly${EXT}"
        fi

        echo "${BIN_DIR}" >> "${GITHUB_PATH}"
        echo "bin-path=${BIN_DIR}/verzly${EXT}" >> "${GITHUB_OUTPUT}"
        echo "release-tag=${RELEASE_TAG}" >> "${GITHUB_OUTPUT}"
        tool_version="$(${BIN_DIR}/verzly${EXT} --version || true)"
        echo "tool-version=${tool_version}" >> "${GITHUB_OUTPUT}"
        printf '%s\n' "${tool_version}"

    - name: Run verzly
      if: inputs.install-only != 'true'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        BIN_PATH: ${{ steps.install.outputs.bin-path }}
        TOOL: ${{ inputs.tool }}
        ARGS: ${{ inputs.args }}
      run: |
        set -euo pipefail
        if [ -n "${TOOL}" ]; then
          # shellcheck disable=SC2086
          "${BIN_PATH}" "${TOOL}" ${ARGS}
        else
          # shellcheck disable=SC2086
          "${BIN_PATH}" ${ARGS}
        fi
