[build]
out_dir = "dist"
default_strategy = "host"
container_engine = "podman"

[artifacts]
checksum = true
manifest = true

[targets.github-release-linux-x64]
enabled = true
triple = "x86_64-unknown-linux-gnu"
strategy = "host"
command = '''
set -e
rm -rf .release-assets
mkdir -p .release-assets
cargo build --package github-release --release
cp target/release/github-release .release-assets/github-release
tar -C .release-assets -czf .release-assets/github-release-linux-x64.tar.gz github-release
'''
artifacts = [
    ".release-assets/github-release-linux-x64.tar.gz",
]

